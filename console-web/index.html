<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AgentOS Console</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #17212b;
      --text: #f5f5f5;
      --hint: #708499;
      --card: #232e3c;
      --accent: #5288c1;
      --sep: #0e1621;
      --ok: #4dab6d;
      --running: #5288c1;
      --warn: #d9913a;
      --error: #e15a5a;
      --down: #b34b4b;
      --unknown: #708499;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 8px; position: sticky; top: 0; background: var(--bg); z-index: 1;
    }
    h1 { font-size: 18px; margin: 0; font-weight: 600; }
    #meta { font-size: 12px; color: var(--hint); }
    #refresh {
      background: var(--accent); color: #fff; border: 0; border-radius: 8px;
      padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    #refresh:disabled { opacity: 0.5; }
    main { padding: 8px 12px 32px; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 520px) { .grid { grid-template-columns: 1fr 1fr; } }
    .card {
      background: var(--card); border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; margin-top: 4px; flex: 0 0 auto; }
    .dot.ok { background: var(--ok); }
    .dot.running { background: var(--running); }
    .dot.warn, .dot.error { background: var(--error); }
    .dot.down { background: var(--down); }
    .dot.unknown, .dot.unconfigured { background: var(--unknown); }
    .card-body { flex: 1 1 auto; min-width: 0; }
    .card-title { font-size: 15px; font-weight: 600; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .kind { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--hint); background: var(--sep); padding: 2px 6px; border-radius: 5px; }
    .card-detail { font-size: 13px; color: var(--hint); margin-top: 4px; word-break: break-word; }
    .card-link { font-size: 12px; color: var(--accent); text-decoration: none; margin-top: 6px; display: inline-block; }
    #notice { padding: 40px 24px; text-align: center; color: var(--hint); line-height: 1.6; }
    #notice b { color: var(--text); display: block; margin-bottom: 6px; }
    .spin { display: inline-block; animation: sp 0.8s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>AgentOS Console</h1>
      <div id="meta">loading…</div>
    </div>
    <button id="refresh">Refresh</button>
  </header>
  <main>
    <div id="notice" hidden></div>
    <div id="grid" class="grid"></div>
  </main>

  <script>
    (function () {
      var tg = window.Telegram && window.Telegram.WebApp;
      var grid = document.getElementById('grid');
      var meta = document.getElementById('meta');
      var notice = document.getElementById('notice');
      var refreshBtn = document.getElementById('refresh');

      // Apply Telegram theme params as CSS variables so Console matches the
      // user's light/dark theme automatically.
      function applyTheme() {
        if (!tg || !tg.themeParams) return;
        var t = tg.themeParams, root = document.documentElement.style;
        if (t.bg_color) root.setProperty('--bg', t.bg_color);
        if (t.text_color) root.setProperty('--text', t.text_color);
        if (t.hint_color) root.setProperty('--hint', t.hint_color);
        if (t.secondary_bg_color) root.setProperty('--card', t.secondary_bg_color);
        if (t.button_color) root.setProperty('--accent', t.button_color);
        if (t.section_separator_color) root.setProperty('--sep', t.section_separator_color);
      }

      function el(tag, cls, text) {
        var n = document.createElement(tag);
        if (cls) n.className = cls;
        if (text != null) n.textContent = text;
        return n;
      }

      // Build notice content with safe DOM nodes only (no innerHTML).
      function showNotice(titleText, bodyText) {
        notice.replaceChildren();
        notice.appendChild(el('b', null, titleText));
        if (bodyText) notice.appendChild(document.createTextNode(bodyText));
        notice.hidden = false;
        grid.replaceChildren();
      }

      function statusClass(s) {
        return ['ok','running','warn','error','down','unknown','unconfigured'].indexOf(s) >= 0 ? s : 'unknown';
      }

      function render(payload) {
        notice.hidden = true;
        grid.replaceChildren();
        var cards = (payload && payload.cards) || [];
        cards.forEach(function (c) {
          var card = el('div', 'card');
          card.appendChild(el('div', 'dot ' + statusClass(c.status)));
          var body = el('div', 'card-body');
          var title = el('div', 'card-title');
          title.appendChild(document.createTextNode(c.label));
          title.appendChild(el('span', 'kind', c.kind));
          body.appendChild(title);
          if (c.detail) body.appendChild(el('div', 'card-detail', String(c.detail)));
          if (c.url) {
            var a = el('a', 'card-link', c.url.replace(/^https?:\/\//, '') + ' ↗');
            a.href = c.url; a.target = '_blank'; a.rel = 'noopener';
            body.appendChild(a);
          }
          card.appendChild(body);
          grid.appendChild(card);
        });
        var d = payload.generatedAt ? new Date(payload.generatedAt) : new Date();
        meta.textContent = cards.length + ' services · updated ' + d.toLocaleTimeString();
      }

      var loading = false;
      function load() {
        if (loading) return;
        loading = true;
        refreshBtn.disabled = true;
        meta.textContent = 'refreshing…';
        var initData = (tg && tg.initData) || '';
        if (!initData) {
          showNotice('Open this from Telegram.', 'Console authenticates via Telegram and stays empty in a normal browser.');
          loading = false; refreshBtn.disabled = false; return;
        }
        fetch('/console/api/status', { headers: { 'Authorization': 'tma ' + initData } })
          .then(function (r) {
            if (r.status === 401) throw new Error('Session invalid or expired — reopen from Telegram.');
            if (r.status === 403) throw new Error('Access denied — this Console is single-user.');
            if (!r.ok) throw new Error('Status request failed (HTTP ' + r.status + ').');
            return r.json();
          })
          .then(render)
          .catch(function (e) { showNotice('Could not load status.', e.message); })
          .then(function () { loading = false; refreshBtn.disabled = false; });
      }

      refreshBtn.addEventListener('click', load);

      if (tg) {
        applyTheme();
        if (tg.onEvent) tg.onEvent('themeChanged', applyTheme);
        try { tg.ready(); tg.expand(); } catch (e) {}
      }
      load();
      setInterval(load, 10000);
    })();
  </script>
</body>
</html>
